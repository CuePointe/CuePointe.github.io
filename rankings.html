<div class="sec-label reveal">Full Season Rankings</div>
<div class="rankings-table-wrap reveal">
  <table class="rankings-table" id="rankTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>Division</th>
        <th>Played</th>
        <th>W</th>
        <th>L</th>
        <th>Win Rate</th>
        <th>Badges</th>
        <th>Trend</th>
        <th>Points</th>
      </tr>
    </thead>
    <tbody id="rankBody">
      </tbody>
  </table>
</div>

<script>
  // 1. YOUR ORIGINAL ANIMATION SCRIPT (Keep this!)
  const obs = new IntersectionObserver((e) => {
    e.forEach((en, i) => { if (en.isIntersecting) setTimeout(() => en.target.classList.add('visible'), i * 60) });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(r => obs.observe(r));

  // 2. THE NEW "LIVE DATA" SCRIPT
  async function loadRankings() {
    try {
      const response = await fetch('players.json');
      const data = await response.json();
      const tableBody = document.getElementById('rankBody');
      
      // Clear the "loading" or old rows
      tableBody.innerHTML = '';

      // Sort by points highest to lowest
      data.players.sort((a, b) => b.ranking_points - a.ranking_points);

      data.players.forEach((player, index) => {
        const rank = index + 1;
        let rankClass = 'other';
        if (rank === 1) rankClass = 'gold';
        if (rank === 2) rankClass = 'silver';
        if (rank === 3) rankClass = 'bronze';

        const row = `
          <tr data-tier="${player.division.toLowerCase()}" data-name="${player.name.toLowerCase()}">
            <td class="rank-cell ${rankClass}">${rank}</td>
            <td>
              <div class="player-cell">
                <div class="player-ava">🎱</div>
                <div>
                  <div class="player-name">${player.name}</div>
                  <div class="player-area">${player.area}</div>
                </div>
              </div>
            </td>
            <td><span class="tier-badge tier-${player.division.toLowerCase()}">${player.division}</span></td>
            <td class="stat-cell">${player.played}</td>
            <td class="stat-cell">${player.wins}</td>
            <td class="stat-cell">${player.losses}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="wbar-wrap"><div class="wbar" style="width:${player.win_rate}%"></div></div>
                <span class="win-pct">${player.win_rate}%</span>
              </div>
            </td>
            <td class="badge-cell">${player.badges}</td>
            <td><span class="${player.trend.includes('▲') ? 'trend-up' : player.trend.includes('▼') ? 'trend-dn' : 'trend-eq'}">${player.trend}</span></td>
            <td class="pts-cell">${player.ranking_points.toLocaleString()}</td>
          </tr>
        `;
        tableBody.innerHTML += row;
      });
    } catch (error) {
      console.error("Could not load rankings:", error);
    }
  }

  // Run the data loader when the page opens
  window.onload = loadRankings;

  // YOUR ORIGINAL SEARCH FUNCTION (Slightly updated for the live data)
  function filterTable() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    document.querySelectorAll('#rankBody tr').forEach(tr => {
      const name = tr.getAttribute('data-name') || '';
      tr.style.display = name.includes(q) ? '' : 'none';
    });
  }
</script>
